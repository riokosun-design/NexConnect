<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NexConnect — Connect. Create. Earn.</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&family=Sora:wght@600;700;800&display=swap" rel="stylesheet" />

  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    :root {
      --bg: #f8fafc;
      --surface: #ffffff;
      --surface-2: #f1f5f9;
      --surface-3: #e2e8f0;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      --primary: #7c3aed;
      --primary-2: #4f46e5;
      --success: #10b981;
      --danger: #f43f5e;
      --warning: #f59e0b;
      --info: #0ea5e9;
      --shadow: 0 24px 70px rgba(15, 23, 42, 0.12);
      --shadow-soft: 0 18px 45px rgba(15, 23, 42, 0.08);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 16px;
      --radius-sm: 12px;
      --gradient: linear-gradient(135deg, #7c3aed 0%, #4f46e5 55%, #06b6d4 100%);
      --earn-gradient: linear-gradient(135deg, #10b981, #14b8a6);
      --rose-gradient: linear-gradient(135deg, #f43f5e, #fb7185);
    }

    html[data-theme="dark"] {
      --bg: #020617;
      --surface: #0f172a;
      --surface-2: #111c31;
      --surface-3: #1e293b;
      --text: #f8fafc;
      --muted: #94a3b8;
      --border: rgba(148, 163, 184, 0.2);
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
      --shadow-soft: 0 18px 45px rgba(0, 0, 0, 0.25);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(124, 58, 237, 0.16), transparent 34%),
        radial-gradient(circle at top right, rgba(16, 185, 129, 0.12), transparent 30%),
        var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button,
    input,
    select,
    textarea {
      font-family: inherit;
    }

    img {
      max-width: 100%;
      display: block;
    }

    .hidden {
      display: none !important;
    }

    .mono {
      font-family: "JetBrains Mono", monospace;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-family: Sora, sans-serif;
      font-weight: 800;
      letter-spacing: -0.04em;
    }

    .brand-mark {
      width: 46px;
      height: 46px;
      border-radius: 16px;
      background: var(--gradient);
      display: grid;
      place-items: center;
      color: #fff;
      box-shadow: 0 18px 35px rgba(124, 58, 237, 0.35);
      font-family: "JetBrains Mono", monospace;
      font-weight: 800;
      position: relative;
      overflow: hidden;
    }

    .brand-mark::after {
      content: "";
      position: absolute;
      inset: -35%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
      transform: rotate(28deg);
    }

    .brand-text strong {
      display: block;
      font-size: 1.18rem;
      line-height: 1;
    }

    .brand-text span {
      display: block;
      font-family: Inter, sans-serif;
      letter-spacing: 0;
      font-size: 0.76rem;
      color: var(--muted);
      margin-top: 4px;
      font-weight: 700;
    }

    .btn {
      border: 0;
      border-radius: 14px;
      padding: 12px 16px;
      font-weight: 800;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
      white-space: nowrap;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn:disabled {
      opacity: 0.65;
      cursor: not-allowed;
      transform: none;
    }

    .btn-primary {
      background: var(--gradient);
      color: #fff;
      box-shadow: 0 18px 34px rgba(124, 58, 237, 0.28);
    }

    .btn-success {
      background: var(--earn-gradient);
      color: #fff;
      box-shadow: 0 18px 34px rgba(16, 185, 129, 0.22);
    }

    .btn-danger {
      background: var(--rose-gradient);
      color: #fff;
    }

    .btn-ghost {
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-light {
      background: rgba(255, 255, 255, 0.16);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.22);
      backdrop-filter: blur(14px);
    }

    .icon-btn {
      width: 44px;
      height: 44px;
      border-radius: 15px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      display: grid;
      place-items: center;
      cursor: pointer;
      position: relative;
      transition: 0.18s ease;
    }

    .icon-btn:hover {
      transform: translateY(-1px);
      box-shadow: var(--shadow-soft);
    }

    .field {
      width: 100%;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      border-radius: 16px;
      padding: 13px 14px;
      outline: none;
      font-size: 0.96rem;
      transition: 0.18s ease;
    }

    .field:focus {
      border-color: rgba(124, 58, 237, 0.75);
      box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.12);
    }

    .label {
      font-weight: 800;
      font-size: 0.86rem;
      margin-bottom: 8px;
      display: block;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .form-row {
      margin-bottom: 14px;
    }

    .auth-shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      padding: 22px;
      gap: 22px;
    }

    .auth-art {
      border-radius: var(--radius-xl);
      background:
        radial-gradient(circle at 18% 18%, rgba(255,255,255,0.28), transparent 24%),
        radial-gradient(circle at 84% 20%, rgba(16,185,129,0.32), transparent 22%),
        var(--gradient);
      color: #fff;
      padding: 42px;
      position: relative;
      overflow: hidden;
      min-height: calc(100vh - 44px);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      box-shadow: var(--shadow);
    }

    .auth-art::before,
    .auth-art::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      background: rgba(255,255,255,0.14);
    }

    .auth-art::before {
      width: 320px;
      height: 320px;
      right: -110px;
      bottom: 100px;
    }

    .auth-art::after {
      width: 220px;
      height: 220px;
      left: -60px;
      bottom: -60px;
    }

    .auth-copy {
      position: relative;
      z-index: 1;
      max-width: 680px;
    }

    .auth-copy h1 {
      font-family: Sora, sans-serif;
      font-size: clamp(2.4rem, 6vw, 5.6rem);
      line-height: 0.96;
      letter-spacing: -0.07em;
      margin: 34px 0 18px;
    }

    .auth-copy p {
      font-size: 1.05rem;
      opacity: 0.9;
      max-width: 560px;
      line-height: 1.75;
    }

    .auth-feature-grid {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      margin-top: 28px;
    }

    .auth-feature {
      padding: 18px;
      border-radius: 22px;
      background: rgba(255,255,255,0.13);
      border: 1px solid rgba(255,255,255,0.22);
      backdrop-filter: blur(18px);
    }

    .auth-feature strong {
      display: block;
      margin-top: 12px;
      font-size: 0.95rem;
    }

    .auth-card-wrap {
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .auth-card {
      width: min(100%, 470px);
      border-radius: var(--radius-xl);
      background: color-mix(in srgb, var(--surface) 92%, transparent);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      padding: 28px;
      backdrop-filter: blur(18px);
    }

    .auth-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      padding: 6px;
      border-radius: 18px;
      background: var(--surface-2);
      margin: 22px 0;
      gap: 6px;
    }

    .auth-tab {
      border: 0;
      background: transparent;
      color: var(--muted);
      border-radius: 14px;
      padding: 12px;
      font-weight: 900;
      cursor: pointer;
    }

    .auth-tab.active {
      background: var(--surface);
      color: var(--text);
      box-shadow: var(--shadow-soft);
    }

    .auth-form {
      display: none;
    }

    .auth-form.active {
      display: block;
    }

    .app-shell {
      min-height: 100vh;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 30;
      background: color-mix(in srgb, var(--bg) 78%, transparent);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(18px);
    }

    .topbar-inner {
      max-width: 1240px;
      margin: 0 auto;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-left: auto;
    }

    .nav-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 11px 12px;
      border-radius: 14px;
      color: var(--muted);
      font-weight: 850;
      font-size: 0.91rem;
      transition: 0.18s ease;
    }

    .nav-link:hover,
    .nav-link.active {
      background: var(--surface-2);
      color: var(--text);
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      position: relative;
    }

    .unread-dot {
      position: absolute;
      top: -5px;
      right: -5px;
      min-width: 20px;
      height: 20px;
      border-radius: 999px;
      background: var(--danger);
      color: #fff;
      font-size: 0.68rem;
      font-weight: 900;
      display: grid;
      place-items: center;
      border: 2px solid var(--surface);
    }

    .avatar-btn {
      border: 0;
      background: var(--surface-2);
      color: var(--text);
      border-radius: 999px;
      padding: 6px 10px 6px 6px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 900;
      cursor: pointer;
    }

    .avatar-circle {
      width: 34px;
      height: 34px;
      border-radius: 999px;
      background: var(--gradient);
      color: #fff;
      display: grid;
      place-items: center;
      font-family: "JetBrains Mono", monospace;
      font-size: 0.78rem;
    }

    .dropdown,
    .notification-panel {
      position: absolute;
      right: 0;
      top: calc(100% + 12px);
      width: 320px;
      background: var(--surface);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      border-radius: 22px;
      padding: 10px;
      display: none;
      z-index: 50;
    }

    .dropdown.open,
    .notification-panel.open {
      display: block;
    }

    .dropdown a,
    .dropdown button {
      width: 100%;
      border: 0;
      background: transparent;
      color: var(--text);
      padding: 12px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
      cursor: pointer;
      text-align: left;
    }

    .dropdown a:hover,
    .dropdown button:hover {
      background: var(--surface-2);
    }

    .page {
      max-width: 1240px;
      margin: 0 auto;
      padding: 26px 18px 52px;
    }

    .page-head {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 22px;
    }

    .page-title {
      margin: 0;
      font-family: Sora, sans-serif;
      font-size: clamp(1.8rem, 4vw, 3rem);
      letter-spacing: -0.06em;
    }

    .page-subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .hero {
      border-radius: var(--radius-xl);
      min-height: 340px;
      overflow: hidden;
      position: relative;
      background: var(--gradient);
      box-shadow: var(--shadow);
      color: #fff;
      margin-bottom: 22px;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      opacity: 0.28;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 84% 16%, rgba(255,255,255,0.25), transparent 28%),
        linear-gradient(135deg, rgba(15, 23, 42, 0.1), rgba(15, 23, 42, 0.48));
    }

    .hero-content {
      position: relative;
      z-index: 1;
      padding: clamp(28px, 5vw, 54px);
      max-width: 760px;
    }

    .hero-kicker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.16);
      border: 1px solid rgba(255,255,255,0.24);
      font-weight: 900;
      margin-bottom: 18px;
    }

    .hero h1 {
      font-family: Sora, sans-serif;
      letter-spacing: -0.07em;
      line-height: 1;
      font-size: clamp(2.2rem, 6vw, 5rem);
      margin: 0;
    }

    .hero p {
      font-size: 1.04rem;
      line-height: 1.75;
      opacity: 0.92;
      max-width: 650px;
      margin: 18px 0 24px;
    }

    .filter-panel,
    .card,
    .chart-card,
    .table-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-soft);
    }

    .filter-panel {
      padding: 16px;
      margin-bottom: 22px;
      position: relative;
    }

    .filters {
      display: grid;
      grid-template-columns: minmax(220px, 1.5fr) repeat(4, minmax(120px, 1fr)) auto;
      gap: 12px;
      align-items: end;
    }

    .autocomplete {
      position: absolute;
      left: 16px;
      top: 82px;
      width: min(420px, calc(100% - 32px));
      background: var(--surface);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      border-radius: 18px;
      padding: 8px;
      z-index: 20;
      display: none;
    }

    .autocomplete.open {
      display: block;
    }

    .autocomplete button {
      width: 100%;
      border: 0;
      background: transparent;
      color: var(--text);
      padding: 11px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      font-weight: 800;
    }

    .autocomplete button:hover {
      background: var(--surface-2);
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 18px;
    }

    .product-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: var(--shadow-soft);
      position: relative;
      display: flex;
      flex-direction: column;
      min-height: 100%;
      transition: 0.18s ease;
    }

    .product-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow);
    }

    .product-image {
      height: 190px;
      background: var(--surface-2);
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .product-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .image-fallback {
      color: var(--muted);
      display: grid;
      place-items: center;
      gap: 8px;
      font-weight: 800;
    }

    .bookmark-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 40px;
      height: 40px;
      border: 0;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: rgba(255,255,255,0.9);
      color: #0f172a;
      cursor: pointer;
      z-index: 2;
      box-shadow: 0 12px 28px rgba(15, 23, 42, 0.16);
    }

    .bookmark-btn.active {
      background: var(--gradient);
      color: #fff;
    }

    .product-body {
      padding: 16px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .product-title {
      font-family: Sora, sans-serif;
      letter-spacing: -0.035em;
      margin: 0 0 10px;
      font-size: 1.05rem;
      line-height: 1.28;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin: 10px 0;
    }

    .tag,
    .badge {
      border-radius: 999px;
      padding: 6px 9px;
      font-size: 0.72rem;
      font-weight: 900;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .tag {
      background: rgba(124, 58, 237, 0.11);
      color: var(--primary);
    }

    .badge-success {
      background: rgba(16, 185, 129, 0.12);
      color: var(--success);
    }

    .badge-danger {
      background: rgba(244, 63, 94, 0.12);
      color: var(--danger);
    }

    .badge-info {
      background: rgba(14, 165, 233, 0.12);
      color: var(--info);
    }

    .badge-gold {
      background: rgba(245, 158, 11, 0.16);
      color: #d97706;
    }

    .price-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin-top: auto;
      padding-top: 12px;
    }

    .price {
      font-family: "JetBrains Mono", monospace;
      font-size: 1.18rem;
      font-weight: 900;
    }

    .real-price {
      color: var(--muted);
      text-decoration: line-through;
      font-size: 0.82rem;
      margin-left: 4px;
    }

    .product-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
    }

    .stat-card {
      padding: 20px;
      border-radius: 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-soft);
      position: relative;
      overflow: hidden;
    }

    .stat-card::after {
      content: "";
      position: absolute;
      width: 110px;
      height: 110px;
      border-radius: 999px;
      background: rgba(124, 58, 237, 0.1);
      right: -35px;
      top: -35px;
    }

    .stat-icon {
      width: 42px;
      height: 42px;
      border-radius: 15px;
      display: grid;
      place-items: center;
      background: var(--surface-2);
      color: var(--primary);
      margin-bottom: 14px;
    }

    .stat-label {
      color: var(--muted);
      font-weight: 800;
      font-size: 0.84rem;
    }

    .stat-value {
      font-family: Sora, sans-serif;
      font-size: 1.75rem;
      letter-spacing: -0.055em;
      margin-top: 6px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1.35fr 0.65fr;
      gap: 18px;
      margin-top: 18px;
    }

    .grid-even {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .card,
    .chart-card,
    .table-card {
      padding: 20px;
    }

    .card-title {
      font-family: Sora, sans-serif;
      letter-spacing: -0.04em;
      margin: 0 0 14px;
      font-size: 1.22rem;
    }

    .table-wrap {
      width: 100%;
      overflow: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 620px;
    }

    th,
    td {
      padding: 13px 10px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      vertical-align: middle;
    }

    th {
      color: var(--muted);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    td {
      font-weight: 700;
    }

    .empty {
      border: 1px dashed var(--border);
      border-radius: 24px;
      padding: 36px 18px;
      text-align: center;
      color: var(--muted);
      background: color-mix(in srgb, var(--surface) 70%, transparent);
    }

    .empty i {
      color: var(--primary);
      width: 42px;
      height: 42px;
    }

    .empty h3 {
      color: var(--text);
      font-family: Sora, sans-serif;
      letter-spacing: -0.04em;
      margin-bottom: 8px;
    }

    .notification-list {
      max-height: 380px;
      overflow: auto;
    }

    .notification-item {
      border-radius: 16px;
      padding: 12px;
      display: grid;
      gap: 5px;
      cursor: pointer;
    }

    .notification-item:hover,
    .notification-item.unread {
      background: var(--surface-2);
    }

    .notification-item small {
      color: var(--muted);
      font-weight: 700;
    }

    .detail-layout {
      display: grid;
      grid-template-columns: 0.9fr 1.1fr;
      gap: 22px;
    }

    .detail-media {
      border-radius: 28px;
      overflow: hidden;
      min-height: 430px;
      background: var(--surface-2);
      display: grid;
      place-items: center;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-soft);
    }

    .detail-media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .toolkit-grid {
      display: grid;
      gap: 12px;
    }

    .copy-box {
      border: 1px solid var(--border);
      background: var(--surface-2);
      border-radius: 18px;
      padding: 12px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
    }

    .copy-box p {
      margin: 0;
      color: var(--text);
      line-height: 1.5;
      font-weight: 650;
    }

    .link-box {
      border-radius: 20px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      padding: 14px;
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      word-break: break-all;
    }

    .method-tabs,
    .period-tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .method-tab,
    .period-tab {
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--muted);
      border-radius: 999px;
      padding: 10px 14px;
      font-weight: 900;
      cursor: pointer;
    }

    .method-tab.active,
    .period-tab.active {
      background: var(--gradient);
      color: #fff;
      border-color: transparent;
    }

    .support-thread {
      display: grid;
      gap: 12px;
    }

    .message-bubble {
      padding: 14px;
      border-radius: 18px;
      background: var(--surface-2);
      border: 1px solid var(--border);
    }

    .message-reply {
      margin-top: 10px;
      padding: 12px;
      border-radius: 15px;
      background: rgba(16, 185, 129, 0.1);
      color: var(--text);
      border: 1px solid rgba(16, 185, 129, 0.18);
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(2, 6, 23, 0.68);
      display: grid;
      place-items: center;
      padding: 18px;
      backdrop-filter: blur(10px);
    }

    .modal {
      width: min(100%, 560px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 24px;
      max-height: 92vh;
      overflow: auto;
    }

    .role-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .role-card {
      border: 1px solid var(--border);
      background: var(--surface-2);
      border-radius: 22px;
      padding: 18px;
      cursor: pointer;
      transition: 0.18s ease;
    }

    .role-card.selected {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.12);
      background: color-mix(in srgb, var(--surface) 70%, rgba(124, 58, 237, 0.08));
    }

    .toast-root {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 120;
      display: grid;
      gap: 10px;
      width: min(360px, calc(100vw - 36px));
    }

    .toast {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      border-radius: 18px;
      padding: 14px;
      display: flex;
      gap: 10px;
      align-items: flex-start;
      font-weight: 800;
    }

    .toast.success i { color: var(--success); }
    .toast.error i { color: var(--danger); }

    @media (max-width: 1100px) {
      .product-grid,
      .stat-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .filters {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .detail-layout,
      .grid-2 {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 860px) {
      .auth-shell {
        grid-template-columns: 1fr;
        padding: 12px;
      }

      .auth-art {
        min-height: auto;
        padding: 28px;
      }

      .auth-feature-grid {
        grid-template-columns: 1fr;
      }

      .topbar-inner {
        flex-wrap: wrap;
      }

      .nav-links {
        order: 3;
        width: 100%;
        overflow-x: auto;
        margin-left: 0;
        padding-bottom: 2px;
      }

      .nav-link {
        flex: 0 0 auto;
      }

      .page-head {
        display: block;
      }
    }

    @media (max-width: 640px) {
      .product-grid,
      .stat-grid,
      .grid-even,
      .form-grid,
      .role-grid,
      .filters {
        grid-template-columns: 1fr;
      }

      .product-actions {
        grid-template-columns: 1fr;
      }

      .auth-card-wrap {
        padding: 0;
      }

      .auth-card {
        padding: 22px;
      }

      .top-actions {
        margin-left: auto;
      }

      .dropdown,
      .notification-panel {
        right: -8px;
        width: min(330px, calc(100vw - 28px));
      }
    }
  </style>
</head>

<body>
  <div id="toast-root" class="toast-root"></div>
  <div id="app"></div>

  <script>
    const DOMAIN = "nexconnect.onrender.com";
    const SHORT_LINK_BASE = `https://${DOMAIN}/go/`;

    const state = {
      token: localStorage.getItem("nexconnect_token"),
      user: null,
      settings: null,
      products: [],
      bookmarks: [],
      bookmarkIds: new Set(),
      notifications: [],
      notificationTimer: null,
      currentChart: null,
      onboardingOpen: false
    };

    document.addEventListener("DOMContentLoaded", init);

    async function init() {
      initTheme();
      window.addEventListener("hashchange", router);

      if (state.token) {
        try {
          await loadMe();
          await Promise.all([loadSettings(), loadBookmarks(), loadNotifications()]);
          startNotificationPolling();
          await router();
          maybeShowOnboarding();
        } catch (error) {
          logout(false);
          toast(error.message || "Session expired. Please login again.", "error");
        }
      } else {
        renderAuthFromRoute();
      }
    }

    function initTheme() {
      const saved = localStorage.getItem("nexconnect_theme");
      const preferred = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
      setTheme(saved || preferred);
    }

    function setTheme(theme) {
      document.documentElement.setAttribute("data-theme", theme);
      localStorage.setItem("nexconnect_theme", theme);
    }

    function toggleTheme() {
      const current = document.documentElement.getAttribute("data-theme") || "light";
      setTheme(current === "dark" ? "light" : "dark");
      refreshIcons();
    }

    async function api(path, options = {}) {
      const opts = {
        method: options.method || "GET",
        headers: {
          "Accept": "application/json",
          ...(options.headers || {})
        }
      };

      if (options.body !== undefined) {
        opts.body = options.body;
        if (!(options.body instanceof FormData)) {
          opts.headers["Content-Type"] = "application/json";
        }
      }

      if (state.token) {
        opts.headers["Authorization"] = `Bearer ${state.token}`;
      }

      const response = await fetch(path, opts);
      const raw = await response.text();
      let data = {};

      try {
        data = raw ? JSON.parse(raw) : {};
      } catch {
        data = { ok: false, error: raw || response.statusText };
      }

      if (response.status === 401 && state.token) {
        logout(false);
      }

      if (!response.ok) {
        throw new Error(data.error || data.message || `Request failed with status ${response.status}`);
      }

      return data;
    }

    async function loadMe() {
      const data = await api("/api/auth/me");
      state.user = data.user;
      return state.user;
    }

    async function loadSettings() {
      const data = await api("/api/settings");
      state.settings = data.settings || {};
      return state.settings;
    }

    async function loadBookmarks() {
      if (!state.token) return [];
      const data = await api("/api/bookmarks");
      state.bookmarks = data.bookmarks || [];
      state.bookmarkIds = new Set(state.bookmarks.map(item => item.product_id));
      return state.bookmarks;
    }

    async function loadNotifications() {
      if (!state.token) return [];
      const data = await api("/api/notifications");
      state.notifications = data.notifications || [];
      paintNotificationWidgets();
      return state.notifications;
    }

    function startNotificationPolling() {
      if (state.notificationTimer) clearInterval(state.notificationTimer);
      state.notificationTimer = setInterval(() => {
        if (state.token) loadNotifications().catch(() => {});
      }, 30000);
    }

    function saveSession(payload) {
      state.token = payload.token;
      state.user = payload.user;
      localStorage.setItem("nexconnect_token", payload.token);
    }

    async function afterAuth(payload) {
      saveSession(payload);
      await Promise.all([loadSettings(), loadBookmarks(), loadNotifications()]);
      startNotificationPolling();
      if (!location.hash || location.hash === "#/login" || location.hash.startsWith("#/signup")) {
        history.replaceState(null, "", "#/home");
      }
      await router();
      maybeShowOnboarding();
    }

    function logout(showMessage = true) {
      localStorage.removeItem("nexconnect_token");
      state.token = null;
      state.user = null;
      state.settings = null;
      state.products = [];
      state.bookmarks = [];
      state.bookmarkIds = new Set();
      state.notifications = [];
      if (state.notificationTimer) clearInterval(state.notificationTimer);
      if (state.currentChart) state.currentChart.destroy();
      state.currentChart = null;
      history.replaceState(null, "", "#/login");
      renderAuth("login");
      if (showMessage) toast("Logged out successfully.", "success");
    }

    function renderAuthFromRoute() {
      const route = getRoute();
      renderAuth(route.name === "signup" ? "signup" : "login");
    }

    function renderAuth(mode = "login") {
      const referral = getReferralFromLocation();
      document.getElementById("app").innerHTML = `
        <section class="auth-shell">
          <aside class="auth-art">
            <div class="auth-copy">
              <div class="brand">
                <div class="brand-mark">NC</div>
                <div class="brand-text">
                  <strong>NexConnect</strong>
                  <span>${DOMAIN}</span>
                </div>
              </div>

              <h1>Connect. Create. Earn.</h1>
              <p>Turn your influence into tracked clicks, creator links, referral income, and smooth withdrawals — all from one polished monetization hub.</p>

              <div class="auth-feature-grid">
                <div class="auth-feature">
                  <i data-lucide="link-2"></i>
                  <strong>Smart short links</strong>
                </div>
                <div class="auth-feature">
                  <i data-lucide="bar-chart-3"></i>
                  <strong>Live analytics</strong>
                </div>
                <div class="auth-feature">
                  <i data-lucide="wallet"></i>
                  <strong>Fast payouts</strong>
                </div>
              </div>
            </div>

            <div class="auth-copy">
              <span class="badge" style="background:rgba(255,255,255,.16);color:#fff;border:1px solid rgba(255,255,255,.22);">
                <i data-lucide="sparkles"></i> Affiliate & Creator Monetization Platform
              </span>
            </div>
          </aside>

          <main class="auth-card-wrap">
            <div class="auth-card">
              <div class="brand">
                <div class="brand-mark">NC</div>
                <div class="brand-text">
                  <strong>NexConnect</strong>
                  <span>Connect. Create. Earn.</span>
                </div>
              </div>

              <div class="auth-tabs">
                <button class="auth-tab ${mode === "login" ? "active" : ""}" data-auth-tab="login">Login</button>
                <button class="auth-tab ${mode === "signup" ? "active" : ""}" data-auth-tab="signup">Signup</button>
              </div>

              <form id="login-form" class="auth-form ${mode === "login" ? "active" : ""}">
                <div class="form-row">
                  <label class="label">Email</label>
                  <input class="field" name="email" type="email" required autocomplete="email" />
                </div>
                <div class="form-row">
                  <label class="label">Password</label>
                  <input class="field" name="password" type="password" required autocomplete="current-password" />
                </div>
                <button class="btn btn-primary" style="width:100%;" type="submit">
                  <i data-lucide="log-in"></i> Login
                </button>
                <button class="btn btn-ghost js-google" style="width:100%;margin-top:10px;" type="button">
                  <i data-lucide="chrome"></i> Continue with Google
                </button>
              </form>

              <form id="signup-form" class="auth-form ${mode === "signup" ? "active" : ""}">
                <div class="form-row">
                  <label class="label">Full name</label>
                  <input class="field" name="full_name" type="text" required autocomplete="name" />
                </div>
                <div class="form-row">
                  <label class="label">Email</label>
                  <input class="field" name="email" type="email" required autocomplete="email" />
                </div>
                <div class="form-row">
                  <label class="label">Password</label>
                  <input class="field" name="password" type="password" required minlength="8" autocomplete="new-password" />
                </div>
                <div class="form-row">
                  <label class="label">Referral code <span style="color:var(--muted);font-weight:700;">optional</span></label>
                  <input class="field mono" name="referral_code" type="text" value="${escapeAttr(referral || "")}" />
                </div>
                <button class="btn btn-primary" style="width:100%;" type="submit">
                  <i data-lucide="user-plus"></i> Create account
                </button>
                <button class="btn btn-ghost js-google" style="width:100%;margin-top:10px;" type="button">
                  <i data-lucide="chrome"></i> Continue with Google
                </button>
              </form>
            </div>
          </main>
        </section>

        <div id="google-modal" class="modal-overlay hidden">
          <div class="modal">
            <div class="page-head" style="margin-bottom:14px;">
              <div>
                <h2 class="card-title" style="margin:0;">Google OAuth Simulation</h2>
                <p class="page-subtitle">Enter a Google email to generate a secure NexConnect session.</p>
              </div>
              <button class="icon-btn" id="close-google" type="button"><i data-lucide="x"></i></button>
            </div>
            <form id="google-form">
              <div class="form-row">
                <label class="label">Google email</label>
                <input class="field" name="email" type="email" required />
              </div>
              <div class="form-row">
                <label class="label">Name</label>
                <input class="field" name="full_name" type="text" required />
              </div>
              <div class="form-row">
                <label class="label">Referral code <span style="color:var(--muted);font-weight:700;">optional</span></label>
                <input class="field mono" name="referral_code" type="text" value="${escapeAttr(referral || "")}" />
              </div>
              <button class="btn btn-primary" style="width:100%;" type="submit">
                <i data-lucide="shield-check"></i> Continue
              </button>
            </form>
          </div>
        </div>
      `;

      attachAuthEvents();
      refreshIcons();
    }

    function attachAuthEvents() {
      document.querySelectorAll("[data-auth-tab]").forEach(btn => {
        btn.addEventListener("click", () => {
          const tab = btn.dataset.authTab;
          const ref = getReferralFromLocation();
          history.replaceState(null, "", tab === "signup" ? `#/signup${ref ? `?ref=${encodeURIComponent(ref)}` : ""}` : "#/login");
          renderAuth(tab);
        });
      });

      document.getElementById("login-form").addEventListener("submit", async event => {
        event.preventDefault();
        const btn = event.submitter;
        setBusy(btn, true);
        try {
          const form = new FormData(event.currentTarget);
          const payload = {
            email: form.get("email"),
            password: form.get("password")
          };
          const data = await api("/api/auth/login", { method: "POST", body: JSON.stringify(payload) });
          await afterAuth(data);
          toast("Welcome back to NexConnect.", "success");
        } catch (error) {
          toast(error.message, "error");
        } finally {
          setBusy(btn, false);
        }
      });

      document.getElementById("signup-form").addEventListener("submit", async event => {
        event.preventDefault();
        const btn = event.submitter;
        setBusy(btn, true);
        try {
          const form = new FormData(event.currentTarget);
          const payload = {
            full_name: form.get("full_name"),
            email: form.get("email"),
            password: form.get("password"),
            role: "normal_user",
            referral_code: form.get("referral_code")
          };
          const data = await api("/api/auth/register", { method: "POST", body: JSON.stringify(payload) });
          await afterAuth(data);
          toast("Account created successfully.", "success");
        } catch (error) {
          toast(error.message, "error");
        } finally {
          setBusy(btn, false);
        }
      });

      document.querySelectorAll(".js-google").forEach(btn => {
        btn.addEventListener("click", () => {
          document.getElementById("google-modal").classList.remove("hidden");
          refreshIcons();
        });
      });

      document.getElementById("close-google").addEventListener("click", () => {
        document.getElementById("google-modal").classList.add("hidden");
      });

      document.getElementById("google-form").addEventListener("submit", async event => {
        event.preventDefault();
        const btn = event.submitter;
        setBusy(btn, true);
        try {
          const form = new FormData(event.currentTarget);
          const payload = {
            email: form.get("email"),
            full_name: form.get("full_name"),
            referral_code: form.get("referral_code")
          };
          const data = await api("/api/auth/google", { method: "POST", body: JSON.stringify(payload) });
          await afterAuth(data);
          toast("Google session created.", "success");
        } catch (error) {
          toast(error.message, "error");
        } finally {
          setBusy(btn, false);
        }
      });
    }

    async function router() {
      if (!state.token) {
        renderAuthFromRoute();
        return;
      }

      if (!state.user) {
        await loadMe();
      }

      const route = getRoute();

      try {
        switch (route.name) {
          case "":
          case "home":
            await renderHome(Object.fromEntries(route.query.entries()));
            break;
          case "product":
            await renderProductDetail(route.params[0]);
            break;
          case "dashboard":
            await renderDashboard(route.query.get("period") || "week");
            break;
          case "earnings":
            await renderEarnings();
            break;
          case "withdraw":
            await renderWithdraw();
            break;
          case "referrals":
            await renderReferrals();
            break;
          case "bookmarks":
            await renderBookmarks();
            break;
          case "support":
            await renderSupport();
            break;
          case "leaderboard":
            await renderLeaderboard(route.query.get("period") || "week");
            break;
          case "profile":
            await renderProfile();
            break;
          default:
            history.replaceState(null, "", "#/home");
            await renderHome({});
        }
        maybeShowOnboarding();
      } catch (error) {
        renderShell(emptyState("triangle-alert", "Something went wrong", error.message), route.name || "home");
        toast(error.message, "error");
      }
    }

    function renderShell(content, active = "home") {
      if (state.currentChart) {
        state.currentChart.destroy();
        state.currentChart = null;
      }

      const nav = [
        ["home", "Home", "home", "#/home"],
        ["dashboard", "Dashboard", "layout-dashboard", "#/dashboard"],
        ["earnings", "Earnings", "wallet", "#/earnings"],
        ["withdraw", "Withdraw", "banknote", "#/withdraw"],
        ["support", "Support", "messages-square", "#/support"]
      ];

      const unread = state.notifications.filter(item => !item.is_read).length;
      const roleText = roleLabel(state.user?.role);

      document.getElementById("app").innerHTML = `
        <div class="app-shell">
          <header class="topbar">
            <div class="topbar-inner">
              <a href="#/home" class="brand">
                <div class="brand-mark">NC</div>
                <div class="brand-text">
                  <strong>NexConnect</strong>
                  <span>${DOMAIN}</span>
                </div>
              </a>

              <nav class="nav-links">
                ${nav.map(item => `
                  <a class="nav-link ${active === item[0] ? "active" : ""}" href="${item[3]}">
                    <i data-lucide="${item[2]}"></i> ${item[1]}
                  </a>
                `).join("")}
              </nav>

              <div class="top-actions">
                <button class="icon-btn" id="notification-toggle" type="button" aria-label="Notifications">
                  <i data-lucide="bell"></i>
                  <span class="unread-dot ${unread ? "" : "hidden"}" data-unread-count>${unread}</span>
                </button>

                ${notificationPanelHtml()}

                <button class="avatar-btn" id="profile-toggle" type="button">
                  <span class="avatar-circle">${initials(state.user?.full_name || state.user?.email)}</span>
                  <span>${escapeHtml(roleText)}</span>
                  <i data-lucide="chevron-down"></i>
                </button>

                <div class="dropdown" id="profile-menu">
                  <a href="#/profile"><i data-lucide="user-round"></i> Profile</a>
                  <a href="#/referrals"><i data-lucide="users-round"></i> Referrals</a>
                  <a href="#/bookmarks"><i data-lucide="bookmark"></i> Bookmarks</a>
                  <a href="#/leaderboard"><i data-lucide="trophy"></i> Leaderboard</a>
                  <button type="button" class="js-theme"><i data-lucide="moon-star"></i> Toggle dark mode</button>
                  <button type="button" class="js-logout"><i data-lucide="log-out"></i> Logout</button>
                </div>
              </div>
            </div>
          </header>

          <main class="page">
            ${content}
          </main>
        </div>
      `;

      attachShellEvents();
      refreshIcons();
    }

    function attachShellEvents() {
      document.querySelector(".js-logout")?.addEventListener("click", () => logout(true));
      document.querySelector(".js-theme")?.addEventListener("click", toggleTheme);

      document.getElementById("profile-toggle")?.addEventListener("click", () => {
        document.getElementById("profile-menu").classList.toggle("open");
        document.getElementById("notification-panel")?.classList.remove("open");
      });

      document.getElementById("notification-toggle")?.addEventListener("click", () => {
        document.getElementById("notification-panel").classList.toggle("open");
        document.getElementById("profile-menu")?.classList.remove("open");
      });

      document.querySelectorAll("[data-read-notification]").forEach(btn => {
        btn.addEventListener("click", async () => {
          await markNotificationRead(btn.dataset.readNotification);
        });
      });

      document.getElementById("mark-all-read")?.addEventListener("click", async () => {
        const unread = state.notifications.filter(item => !item.is_read);
        await Promise.all(unread.map(item => api(`/api/notifications/${item.id}/read`, { method: "PUT", body: JSON.stringify({}) }).catch(() => {})));
        await loadNotifications();
        renderShell(document.querySelector(".page")?.innerHTML || "", getRoute().name);
      });
    }

    function notificationPanelHtml() {
      const items = state.notifications.slice(0, 8);
      return `
        <div class="notification-panel" id="notification-panel">
          <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 10px 12px;">
            <strong>Notifications</strong>
            <button class="btn btn-ghost" id="mark-all-read" type="button" style="padding:8px 10px;">Read all</button>
          </div>
          <div class="notification-list" id="notification-list">
            ${items.length ? items.map(item => `
              <div class="notification-item ${item.is_read ? "" : "unread"}" data-read-notification="${escapeAttr(item.id)}">
                <strong>${escapeHtml(item.message)}</strong>
                <small>${escapeHtml(item.type)} • ${formatDate(item.created_at)}</small>
              </div>
            `).join("") : `<div class="empty" style="padding:24px 12px;"><h3>No notifications</h3><p>You're all caught up.</p></div>`}
          </div>
        </div>
      `;
    }

    function paintNotificationWidgets() {

    async function loadProducts(filters = {}) {
      const params = new URLSearchParams();
      ["search", "category", "tag", "min_price", "max_price"].forEach(key => {
        if (filters[key]) params.set(key, filters[key]);
      });
      const data = await api(`/api/products${params.toString() ? `?${params.toString()}` : ""}`);
      state.products = data.products || [];
      return state.products;
    }

    function attachHomeEvents() {
      const form = document.getElementById("filter-form");
      form.addEventListener("submit", event => {
        event.preventDefault();
        const formData = new FormData(form);
        const params = new URLSearchParams();
        for (const [key, value] of formData.entries()) {
          if (String(value).trim()) params.set(key, String(value).trim());
        }
        location.hash = `#/home${params.toString() ? `?${params.toString()}` : ""}`;
      });

      const input = document.getElementById("search-input");
      const box = document.getElementById("autocomplete");

      input.addEventListener("input", () => {
        const term = input.value.trim().toLowerCase();
        if (!term) {
          box.classList.remove("open");
          box.innerHTML = "";
          return;
        }

        const matches = state.products
          .filter(p => `${p.title || ""} ${p.category || ""} ${(p.tags || []).join(" ")}`.toLowerCase().includes(term))
          .slice(0, 6);

        box.innerHTML = matches.map(item => `
          <button type="button" data-suggestion="${escapeAttr(item.title)}">
            <span>${escapeHtml(item.title)}</span>
            <small>${formatMoney(item.sales_price)}</small>
          </button>
        `).join("");

        box.classList.toggle("open", matches.length > 0);

        box.querySelectorAll("[data-suggestion]").forEach(btn => {
          btn.addEventListener("click", () => {
            input.value = btn.dataset.suggestion;
            box.classList.remove("open");
            form.requestSubmit();
          });
        });
      });
    }

    async function toggleBookmark(productId) {
      try {
        if (state.bookmarkIds.has(productId)) {
          await api(`/api/bookmarks/${productId}`, { method: "DELETE" });
          toast("Bookmark removed.", "success");
        } else {
          await api("/api/bookmarks", { method: "POST", body: JSON.stringify({ product_id: productId }) });
          toast("Product saved.", "success");

        await loadBookmarks();
        await router();

          document.getElementById("bank-fields").classList.toggle("hidden", method !== "bank");
        });

      document.getElementById("withdraw-form").addEventListener("submit", async event => {
        event.preventDefault();

        try {
          const form = new FormData(event.currentTarget);
          const method = form.get("method");
          const payload = {
            amount: Number(form.get("amount")),
            method,
            upi_id: form.get("upi_id"),

          setBusy(btn, false);

      await loadMe();

      renderShell(`

    function maybeShowOnboarding() {
      if (!state.user || state.user.role === "admin" || state.user.onboarding_completed || state.onboardingOpen) return;
      setTimeout(showOnboarding, 250);
    }

    function showOnboarding() {
      if (state.onboardingOpen) return;
      state.onboardingOpen = true;

      let step = 1;
      const data = {
        role: "influencer",
        youtube_link: "",
        instagram_link: "",
        tiktok_link: "",
        follower_count: 0
      };

      const overlay = document.createElement("div");
      overlay.className = "modal-overlay";
      document.body.appendChild(overlay);

      const paint = () => {
        overlay.innerHTML = `
          <div class="modal">
            <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px;">
              <div>
                <h2 class="card-title" style="margin:0;">Welcome to NexConnect</h2>
                <p class="page-subtitle">Step ${step} of 3</p>
              </div>
              <span class="badge badge-info">Onboarding</span>
            </div>

            ${step === 1 ? `
              <h3 class="card-title">Choose your role</h3>
              <div class="role-grid">
                <div class="role-card ${data.role === "influencer" ? "selected" : ""}" data-on-role="influencer">
                  <i data-lucide="video"></i>
                  <h3>Content Creator</h3>
                  <p class="page-subtitle">Promote products, track clicks, earn commissions.</p>
                </div>
                <div class="role-card ${data.role === "normal_user" ? "selected" : ""}" data-on-role="normal_user">
                  <i data-lucide="user-round"></i>
                  <h3>Normal User</h3>
                  <p class="page-subtitle">Browse products, save favorites, use referrals.</p>
                </div>
              </div>
              <button class="btn btn-primary" id="on-next" style="margin-top:16px;width:100%;">Continue</button>
            ` : ""}

            ${step === 2 ? `
              <h3 class="card-title">${data.role === "influencer" ? "Add creator channels" : "Confirm preferences"}</h3>
              ${data.role === "influencer" ? `
                <div class="form-row">
                  <label class="label">YouTube link</label>
                  <input class="field" id="on-youtube" value="${escapeAttr(data.youtube_link)}" />
                </div>
                <div class="form-row">
                  <label class="label">Instagram link</label>
                  <input class="field" id="on-instagram" value="${escapeAttr(data.instagram_link)}" />
                </div>
                <div class="form-row">
                  <label class="label">TikTok link</label>
                  <input class="field" id="on-tiktok" value="${escapeAttr(data.tiktok_link)}" />
                </div>
                <div class="form-row">
                  <label class="label">Follower count</label>
                  <input class="field" id="on-followers" type="number" min="0" value="${escapeAttr(data.follower_count)}" />
                </div>
              ` : `<p class="page-subtitle">You can still generate links, bookmark products, and use referrals. You may switch to creator mode anytime from Profile.</p>`}
              <div style="display:flex;gap:10px;">
                <button class="btn btn-ghost" id="on-back">Back</button>
                <button class="btn btn-primary" id="on-next">Continue</button>
              </div>
            ` : ""}

            ${step === 3 ? `
              <h3 class="card-title">Explore the platform</h3>
              <p class="page-subtitle">Your dashboard, links, withdrawals, referrals, bookmarks, support, notifications, and leaderboard are ready.</p>
              <div class="grid-even">
                <div class="card" style="box-shadow:none;background:var(--surface-2);"><i data-lucide="link"></i><strong style="display:block;margin-top:8px;">Get product links</strong></div>
                <div class="card" style="box-shadow:none;background:var(--surface-2);"><i data-lucide="wallet"></i><strong style="display:block;margin-top:8px;">Withdraw earnings</strong></div>
              </div>
              <div style="display:flex;gap:10px;margin-top:16px;">
                <button class="btn btn-ghost" id="on-back">Back</button>
                <button class="btn btn-success" id="finish-onboarding">Start earning</button>
              </div>
            ` : ""}
          </div>
        `;

        overlay.querySelectorAll("[data-on-role]").forEach(card => {
          card.addEventListener("click", () => {
            data.role = card.dataset.onRole;
            paint();
          });
        });

        overlay.querySelector("#on-back")?.addEventListener("click", () => {
          step = Math.max(1, step - 1);
          paint();
        });

        overlay.querySelector("#on-next")?.addEventListener("click", () => {
          if (step === 2 && data.role === "influencer") {
            data.youtube_link = overlay.querySelector("#on-youtube").value;
            data.instagram_link = overlay.querySelector("#on-instagram").value;
            data.tiktok_link = overlay.querySelector("#on-tiktok").value;
            data.follower_count = Number(overlay.querySelector("#on-followers").value || 0);
          }
          step = Math.min(3, step + 1);
          paint();
        });

        overlay.querySelector("#finish-onboarding")?.addEventListener("click", async () => {
          try {
            const response = await api("/api/users/profile", {
              method: "PUT",
              body: JSON.stringify({
                role: data.role,
                youtube_link: data.youtube_link,
                instagram_link: data.instagram_link,
                tiktok_link: data.tiktok_link,
                follower_count: data.follower_count,
                onboarding_completed: true
              })
            });
            state.user = response.user;
            state.onboardingOpen = false;
            overlay.remove();
            toast("Onboarding completed.", "success");
            await router();
          } catch (error) {
            toast(error.message, "error");
          }
        });

        refreshIcons();
      };

      paint();
    }

    function getRoute() {
      const hash = location.hash || "#/home";
      const clean = hash.replace(/^#/, "");
      const [pathPart, queryPart = ""] = clean.split("?");
      const parts = pathPart.split("/").filter(Boolean);
      return {
        name: parts[0] || "home",
        params: parts.slice(1),
        query: new URLSearchParams(queryPart)
      };
    }

    function getReferralFromLocation() {
      const route = getRoute();
      return route.query.get("ref") || new URLSearchParams(location.search).get("ref") || "";
    }

    function tagsHtml(tags) {
      return (tags || []).slice(0, 4).map(tag => `<span class="tag">${escapeHtml(tag)}</span>`).join("");
    }

    function tierBadge(tier) {
      const label = String(tier || "bronze").toLowerCase();
      const cls = label === "gold" ? "badge-gold" : label === "silver" ? "badge-info" : "badge-success";
      return `<span class="badge ${cls}"><i data-lucide="award"></i> ${escapeHtml(label)}</span>`;
    }

    function emptyState(icon, title, text) {
      return `
        <div class="empty">
          <i data-lucide="${icon}"></i>
          <h3>${escapeHtml(title)}</h3>
          <p>${escapeHtml(text)}</p>
        </div>
      `;
    }

    function roleLabel(role) {
      if (role === "admin") return "Admin";
      if (role === "influencer") return "Creator";
      return "User";
    }

    function initials(value) {
      const text = String(value || "NC").trim();
      const parts = text.includes("@") ? [text[0], text.split("@")[0][1] || "C"] : text.split(/\s+/).slice(0, 2).map(p => p[0]);
      return parts.join("").toUpperCase().slice(0, 2);
    }

    function formatMoney(value) {
      return new Intl.NumberFormat("en-IN", {
        style: "currency",
        currency: "INR",
        maximumFractionDigits: 2
      }).format(Number(value || 0));
    }

    function formatDate(value) {
      if (!value) return "-";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "-";
      return date.toLocaleString();
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[char]));
    }

    function escapeAttr(value) {
      return escapeHtml(value);
    }

    function setBusy(button, busy) {
      if (!button) return;
      if (busy) {
        button.dataset.originalHtml = button.innerHTML;
        button.disabled = true;
        button.innerHTML = `<i data-lucide="loader-2"></i> Please wait`;
        refreshIcons();
      } else {
        button.disabled = false;
        if (button.dataset.originalHtml) button.innerHTML = button.dataset.originalHtml;
        refreshIcons();
      }
    }

    async function copyText(text) {
      try {
        await navigator.clipboard.writeText(text);
      } catch {
        const textarea = document.createElement("textarea");
        textarea.value = text;
        textarea.style.position = "fixed";
        textarea.style.opacity = "0";
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand("copy");
        textarea.remove();
      }
      toast("Copied to clipboard.", "success");
    }

    function toast(message, type = "success") {
      const root = document.getElementById("toast-root");
      const item = document.createElement("div");
      item.className = `toast ${type}`;
      item.innerHTML = `<i data-lucide="${type === "error" ? "circle-alert" : "circle-check"}"></i><span>${escapeHtml(message)}</span>`;
      root.appendChild(item);
      refreshIcons();
      setTimeout(() => item.remove(), 3800);
    }

    function refreshIcons() {
      if (window.lucide) {
        window.lucide.createIcons();
      }
    }
  </script>
</body>
